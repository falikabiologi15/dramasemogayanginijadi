<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMandarin | Jelajah C-Drama</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo" id="mainLogo"></div>
        <nav>
            <ul>
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#rekomendasi">Rekomendasi</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1 class="fade-in">JELAJAH</h1>
            <p class="fade-in-delayed">Temukan keajaiban dalam setiap bingkai cerita Mandarin.</p>
            <a href="#rekomendasi" class="btn-explore">Mulai Jelajah</a>
        </div>
    </section>

    <main id="rekomendasi">
        <div class="container">
            <div class="section-title">
                <h2>Rekomendasi Pilihan</h2>
                <div class="line"></div>
            </div>
            <div class="drama-grid" id="dramaGrid">
                </div>
        </div>
    </main>

    <div id="trailerModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="video-container">
                <iframe id="trailerVideo" src="" frameborder="0" allowfullscreen></iframe>
            </div>
            <h3 id="modalTitle" style="margin-top: 15px; color: #d4af37;"></h3>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
